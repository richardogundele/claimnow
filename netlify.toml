[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# --- Backend Proxy Rules ---
# Netlify forwards these routes to Render so the frontend uses relative URLs.
# This avoids CORS issues and hides the backend URL from the client.

[[redirects]]
  from = "/analyze/*"
  to = "https://claimnow-backend.onrender.com/analyze/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/rag/*"
  to = "https://claimnow-backend.onrender.com/rag/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/rates/*"
  to = "https://claimnow-backend.onrender.com/rates/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "https://claimnow-backend.onrender.com/health"
  status = 200
  force = true

[[redirects]]
  from = "/models"
  to = "https://claimnow-backend.onrender.com/models"
  status = 200
  force = true

# --- SPA Fallback ---
# All remaining routes go to index.html for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
