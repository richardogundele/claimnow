[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  
[[redirects]]
  # Proxy /api/* requests to the Render backend to avoid CORS issues.
  # IMPORTANT: After first Render deploy, confirm your service URL and update this.
  # Render assigns: https://claimnow-backend.onrender.com (based on service name in render.yaml)
  from = "/api/*"
  to = "https://claimnow-backend.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  # Redirect all other traffic to index.html for React Router
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
